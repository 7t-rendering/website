```html
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 not found</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Montserrat:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #6c63ff;
        --secondary: #ff6584;
        --dark: #1a1a2e;
        --light: #f5f5f7;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(
          rgba(26, 26, 46, 0.92),
          rgba(26, 26, 46, 0.95)
        );
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .container {
        text-align: center;
        max-width: 700px;
        padding: 20px;
      }

      .logo {
        font-family: "Montserrat", sans-serif;
        font-size: 3rem;
        font-weight: 700;
        margin-bottom: 30px;
      }

      .logo span {
        color: var(--primary);
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 20px;
      }

      .highlight {
        color: var(--primary);
      }

      p {
        color: #ccc;
        font-size: 1.1rem;
        line-height: 1.8;
        margin-bottom: 40px;
      }

      .loader {
        width: 70px;
        height: 70px;
        border: 5px solid rgba(255, 255, 255, 0.15);
        border-top: 5px solid var(--primary);
        border-radius: 50%;
        margin: auto;
        animation: spin 1s linear infinite;
      }

      .home-btn {
        display: inline-block;
        margin-top: 40px;
        background: var(--primary);
        color: white;
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 30px;
        font-weight: 600;
        transition: 0.3s;
      }
      .home-btn:hover {
        background: #5a52e0;
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(108, 99, 255, 0.5);
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      .footer {
        margin-top: 50px;
        color: #8a8aa3;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">7<span>T</span> RENDERING</div>

      <h1>
        404 Not Found <br>/<span class="highlight">Site Under Maintenance</span>
      </h1>

      <p>
        We're currently improving and updating this page to provide a better
        experience. Please check back later.
      </p>

      <div class="loader"></div>

      <a href="index.html" class="home-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>

      <div class="footer">
        © 2026 7T RENDERING • Thank you for your patience.
      </div>
    </div>
  </body>
</html>
